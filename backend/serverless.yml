service: cloud-resume-analyzer
frameworkVersion: '3'
useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  stage: prod
  region: us-east-1
  memorySize: 512
  timeout: 29
  architecture: arm64
  environment:
    GROQ_API_KEY: ${env:GROQ_API_KEY}
    GROQ_MODEL: ${env:GROQ_MODEL, 'llama-3.1-8b-instant'}
    DYNAMODB_TABLE_NAME: !Ref ResumeAnalyzerTable
    DYNAMODB_REPORT_KEY: reportId
    S3_BUCKET_NAME: !Ref ResumeUploadsBucket
    COGNITO_REGION: ${env:COGNITO_REGION, 'us-east-1'}
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID}
    COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID}
    NODE_ENV: production
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource:
            - !Sub "arn:aws:s3:::${ResumeUploadsBucket}/*"
        - Effect: Allow
          Action:
            - textract:DetectDocumentText
          Resource: "*"
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Scan
          Resource:
            - !GetAtt ResumeAnalyzerTable.Arn

functions:
  api:
    handler: src/lambda.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
      - httpApi:
          path: /
          method: ANY

package:
  individually: true
  patterns:
    - "!node_modules/.cache/**"
    - "!node_modules/aws-sdk/**"
    - "!.env"
    - "!.env.*"
    - "!README.md"
    - "!.git/**"

resources:
  Resources:
    ResumeUploadsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: cloud-resume-analyzer-uploads-${sls:stage}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        BucketEncryption:
          ServerSideEncryptionConfiguration:
            - ServerSideEncryptionByDefault:
                SSEAlgorithm: AES256

    ResumeAnalyzerTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: resumeanalyzer-${sls:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: reportId
            AttributeType: S
        KeySchema:
          - AttributeName: reportId
            KeyType: HASH

  Outputs:
    ApiUrl:
      Description: URL of the API Gateway endpoint
      Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
    S3BucketName:
      Description: Name of the S3 bucket for resume uploads
      Value: !Ref ResumeUploadsBucket
    DynamoDBTableName:
      Description: Name of the DynamoDB table
      Value: !Ref ResumeAnalyzerTable
